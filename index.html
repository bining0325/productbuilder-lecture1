<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행운의 로또 번호 추첨기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="theme-toggle">
            <button id="theme-btn">🌙 다크 모드</button>
        </div>
        <h1>행운의 로또 번호 추첨기</h1>
        <div id="lotto-numbers">
            <!-- 번호 공들이 여기에 생성됩니다 -->
        </div>
        <button id="draw-btn">추첨하기</button>

        <hr class="divider">

        <section class="contact-section">
            <h3>제휴 문의</h3>
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" id="contact-form">
                <div class="input-group">
                    <input type="text" name="name" placeholder="성함" required>
                </div>
                <div class="input-group">
                    <input type="email" name="_replyto" placeholder="이메일 주소" required>
                </div>
                <div class="input-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" id="submit-btn">문의 보내기</button>
            </form>
        </section>
    </div>
    <script src="main.js"></script>
</body>
</html>
